site_name: Trackr - Documentation officielle
site_description: Documentation complète du projet Trackr (SAE-DEV)
site_author: Équipe Trackr

docs_dir: Documentation_Site

theme:
  name: material
  language: fr
  icon:
    logo: material/movie-open-play
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Passer au mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Passer au mode clair
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.tracking
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Accueil: index.md
  - Fonctionnalités: fonctionnalites.md
  - Installation et Compilation: installation.md
  - Rendus du projet:
      - Rendu 1 (Analyse IHM): Rendu-1/rendu1.md
      - Rendu 2 (Conception): Rendu-2/rendu2.md
  - Développement:
      - Guide de contribution: CONTRIBUTING.md
      - Historique: CHANGELOG.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.blocks.caption
  - pymdownx.blocks.definition
  - pymdownx.blocks.admonition
  - pymdownx.blocks.details
  - pymdownx.blocks.tab
  - pymdownx.blocks.grid:
      cards: true
